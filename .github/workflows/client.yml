name: Client CI

on:
  pull_request:
    paths:
      - 'client/**'
      - '.github/workflows/client.yml'
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/client.yml'

defaults:
  run:
    working-directory: client

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  test:
    runs-on: ubuntu-latest

    # E2E tests hit a real Rails backend — the onboarding flow's value is
    # in the server round-trips (register, room CRUD, species search,
    # onboarding completion). We mirror the local dev stack: postgres +
    # Rails on :3000, Vite dev server on :5173 proxying /api → :3000.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: plantcare
          POSTGRES_PASSWORD: plantcare_dev
          POSTGRES_DB: plantcare_development
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U plantcare"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: development
      DB_HOST: localhost
      DB_USERNAME: plantcare
      DB_PASSWORD: plantcare_dev
      JWT_SECRET: test_jwt_secret_for_ci_only
      VITE_API_URL: http://localhost:3000
      # cable.yml + sidekiq initializer default to docker-compose hostnames.
      # Override both so Rails + Sidekiq + ActionCable hit the localhost
      # Redis service instead of attempting `redis:6379` DNS lookups.
      REDIS_URL: redis://localhost:6379/0
      REDIS_CABLE_URL: redis://localhost:6379/1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: api
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('client/package-lock.json') }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Prepare database
        working-directory: api
        run: bin/rails db:prepare

      - name: Start Rails API
        working-directory: api
        run: |
          bin/rails server -p 3000 -b 0.0.0.0 > /tmp/rails.log 2>&1 &
          echo $! > /tmp/rails.pid
          for i in {1..30}; do
            if curl -sf http://localhost:3000/up > /dev/null; then
              echo "Rails ready"
              exit 0
            fi
            sleep 1
          done
          echo "Rails failed to start"
          cat /tmp/rails.log
          exit 1

      # Achievements + notifications specs need CheckAchievementsJob to run.
      # Without Sidekiq the job sits in the Redis queue forever, the cable
      # broadcast never fires, and the toast never renders.
      - name: Start Sidekiq
        working-directory: api
        run: |
          bundle exec sidekiq > /tmp/sidekiq.log 2>&1 &
          echo $! > /tmp/sidekiq.pid
          for i in {1..30}; do
            if grep -qE "Starting processing|Booted Rails" /tmp/sidekiq.log 2>/dev/null; then
              echo "Sidekiq ready"
              exit 0
            fi
            sleep 1
          done
          echo "Sidekiq failed to start"
          cat /tmp/sidekiq.log
          exit 1

      - name: Run Playwright tests
        run: npm test
        env:
          CI: true

      - name: Stop Sidekiq
        if: always()
        run: kill "$(cat /tmp/sidekiq.pid)" 2>/dev/null || true

      - name: Stop Rails API
        if: always()
        run: kill "$(cat /tmp/rails.pid)" 2>/dev/null || true

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            client/test-results/
            client/playwright-report/
            /tmp/rails.log
            /tmp/sidekiq.log
          retention-days: 7
