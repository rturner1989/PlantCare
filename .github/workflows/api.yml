name: API CI

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/api.yml'

# dorny/paths-filter@v3 calls the GitHub API's listFiles endpoint on PR
# events and needs `pull-requests: read` to succeed — without it the job
# fails with "Resource not accessible by integration" and skips all
# downstream jobs.
permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
              - '.github/workflows/api.yml'

  lint:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: api
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v4
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('api/.ruby-version', 'api/.rubocop.yml', 'api/Gemfile.lock') }}
        with:
          path: api/${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bundle exec rubocop -f github

  security:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: api
          bundler-cache: true

      - name: Scan for security vulnerabilities
        run: bundle exec brakeman --no-pager

      - name: Scan for known gem vulnerabilities
        run: bundle exec bundler-audit check --update

  test:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: plantcare
          POSTGRES_PASSWORD: plantcare_test
          POSTGRES_DB: plantcare_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U plantcare"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      DB_HOST: localhost
      DB_USERNAME: plantcare
      DB_PASSWORD: plantcare_test
      DB_NAME: plantcare_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: test_jwt_secret_for_ci_only

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: api
          bundler-cache: true

      - name: Set up database
        run: bin/rails db:prepare

      - name: Run tests
        run: bin/rails test
