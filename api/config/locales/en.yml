# Files in the config/locales directory are used for internationalization and
# are automatically loaded by Rails. If you want to use locales other than
# English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t "hello"
#
# In views, this is aliased to just `t`:
#
#     <%= t("hello") %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# To learn more about the API, please read the Rails Internationalization guide
# at https://guides.rubyonrails.org/i18n.html.
#
# Be aware that YAML interprets the following case-insensitive strings as
# booleans: `true`, `false`, `on`, `off`, `yes`, `no`. Therefore, these strings
# must be quoted to be interpreted as strings. For example:
#
#     en:
#       "yes": yup
#       enabled: "ON"

en:
  hello: "Hello world"

  # Override default ActiveRecord validation messages where Rails' defaults
  # read awkwardly in the UI. Keys mirror the model / attribute hierarchy —
  # `activerecord.errors.models.<model>.attributes.<attr>.<validator>`.
  activerecord:
    errors:
      models:
        user:
          attributes:
            password_confirmation:
              # Rails default: "doesn't match Password" — reads oddly because
              # "Password" is the humanised attribute name interpolated into
              # the stock message. Replacing with a plain-English version.
              confirmation: "does not match the password"
            password:
              # Custom symbols raised from User#password_composition and
              # User#password_not_common — the wording here is what the
              # user sees inline under the password field.
              missing_letter: "must contain at least one letter"
              missing_digit: "must contain at least one number"
              too_common: "is too common — pick something less guessable"
