plugins:
  - rubocop-rails

AllCops:
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'db/**/*'
    - 'config/**/*'
    - 'scripts/**/*'
    - 'vendor/**/*'
    - 'bin/**/*'

# Line length — 160 is more practical than the default 120
Layout/LineLength:
  Max: 160

# Style opinions
Style/GuardClause:
  MinBodyLength: 3

Style/EmptyMethod:
  EnforcedStyle: expanded

Style/WordArray:
  EnforcedStyle: brackets

Style/SymbolArray:
  EnforcedStyle: brackets

Style/RegexpLiteral:
  EnforcedStyle: slashes

Style/AccessorGrouping:
  EnforcedStyle: separated

Style/Documentation:
  Enabled: false

Style/ClassAndModuleChildren:
  Enabled: false

Style/HashLikeCase:
  Enabled: false

Style/OptionalBooleanParameter:
  Enabled: false

Style/ExplicitBlockArgument:
  Enabled: false

Style/OpenStructUse:
  Enabled: false

Style/RedundantRegexpEscape:
  Enabled: false

Style/RedundantRegexpCharacterClass:
  Enabled: false

# Naming
Naming/VariableNumber:
  Enabled: false

Naming/AccessorMethodName:
  Enabled: false

Naming/PredicatePrefix:
  Enabled: false

Naming/MemoizedInstanceVariableName:
  Enabled: false

Naming/MethodParameterName:
  Enabled: false

# Metrics — readability matters more than arbitrary limits
Metrics/ParameterLists:
  Enabled: false

Metrics/ClassLength:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Metrics/ModuleLength:
  Enabled: false

Metrics/AbcSize:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/BlockLength:
  Enabled: false

# Lint
Lint/MissingSuper:
  Enabled: false

# Rails
Rails/HasAndBelongsToMany:
  Enabled: false
