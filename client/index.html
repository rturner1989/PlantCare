<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/branding/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/branding/icon-16.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" sizes="180x180" href="/branding/icon-180.png" />
    <!-- PWA manifest: tells browsers name, icons, launch mode (standalone),
         and colours. Required for Android's install prompt and Chrome PWA
         behaviour; iOS ignores the manifest but launches standalone from
         the apple-mobile-web-app-capable meta tag below. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- viewport-fit=cover lets CSS use env(safe-area-inset-*) on iOS
         PWA standalone mode so the app can draw into the notch/home
         indicator area instead of leaving it white. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <!-- Status bar tint on Chrome (Android) and PWA chrome elsewhere.
         Matches the top of the mint gradient so the system UI blends. -->
    <meta name="theme-color" content="#f6fbf4" />
    <!-- iOS PWA standalone: when the user "Add to Home Screen" in Safari
         and launches from the home screen, render full-screen with no
         browser chrome. `black-translucent` makes the status bar area
         transparent so the mint gradient extends into it, matching the
         bottom safe-area behaviour. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rootine" />
    <title>Rootine</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
